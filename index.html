<!DOCTYPE html>
<html lang="en">
<head>

  <title>Ava — Link in Bio</title>
  <meta name="description" content="just a girl who doesn't hold back 🖤">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .photo-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #2a2a2a;
      margin-bottom: 18px;
    }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    h1 { font-size: 22px; font-weight: 600; color: #f0f0f0; margin-bottom: 6px; }
    .tagline { font-size: 14px; color: #666; text-align: center; margin-bottom: 32px; line-height: 1.5; }
    .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-fanvue { background: #1DB954; color: #fff; }
    .btn-secondary { background: #1a1a1a; color: #e8e8e8; border: 1px solid #2a2a2a; }
    .btn-icon { width: 22px; height: 22px; flex-shrink: 0; }
    .footer { margin-top: 36px; font-size: 12px; color: #333; text-align: center; }
  </style>
</head>
